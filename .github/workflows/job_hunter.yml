name: Job Hunter Bot

on:
  schedule:
    - cron: '0 10 * * *'   # 6:00 AM EDT
    - cron: '0 13 * * *'   # 9:00 AM EDT
    - cron: '0 16 * * *'   # 12:00 PM EDT
    - cron: '0 19 * * *'   # 3:00 PM EDT
    - cron: '0 22 * * *'   # 6:00 PM EDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Create config.py from secrets
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          cat > config.py << PYEOF
          PROFILE = {
              "name": "Sri Krishna Sai Kota",
              "email": "srikrishnasaikota@gmail.com",
              "phone": "813-509-4528",
              "linkedin": "https://www.linkedin.com/in/srikrishnasai/",
              "github": "https://github.com/KRISHNA-05-06",
              "location": "Tampa, FL",
              "resume_path": "data/resume.pdf",
              "skills": [
                  "Python", "SQL", "Apache Spark", "Apache Kafka", "Apache Airflow",
                  "AWS Glue", "AWS EMR", "AWS S3", "AWS Redshift", "Databricks",
                  "Snowflake", "dbt", "Hadoop", "Hive", "PostgreSQL", "MySQL",
                  "MongoDB", "Docker", "Kubernetes", "Git", "PySpark",
                  "Data Modeling", "ETL", "ELT", "Data Lakes", "Data Warehouses",
                  "Streaming", "Batch Processing", "Grafana", "CloudWatch"
              ],
              "education": "M.S. in Computer Science - University of South Florida (2024-2026)",
              "experience_years": 1,
              "summary": (
                  "Aspiring Data Engineer pursuing M.S. in Computer Science with hands-on "
                  "experience building scalable ETL/ELT pipelines and real-time data systems."
              ),
          }
          SEARCH = {
              "roles": ["Data Engineer","Junior Data Engineer","Entry Level Data Engineer","ETL Developer","Big Data Engineer"],
              "locations": ["United States"],
              "job_types": ["Full-time"],
              "experience_levels": ["Entry level", "Associate"],
              "min_match_score": 65,
              "auto_apply_min_score": 80,
              "blacklist_companies": [],
              "keywords_required": ["data engineer","data pipeline","etl","spark","aws"],
              "keywords_excluded": ["senior","staff","principal","lead","10+ years","philippines","india","poland","spain","portugal","brazil","canada","uk","united kingdom","australia"],
          }
          SCHEDULER = {
              "check_interval_minutes": 60,
              "max_applies_per_day": 0,
              "apply_delay_seconds": 45,
          }
          NOTIFICATIONS = {
              "email_enabled": True,
              "email_sender":    "$EMAIL_SENDER",
              "email_password":  "$EMAIL_PASSWORD",
              "email_recipient": "$EMAIL_RECIPIENT",
              "telegram_enabled": False,
              "telegram_bot_token": "",
              "telegram_chat_id": "",
          }
          AI = {
              "groq_api_key": "$GROQ_API_KEY",
              "model": "llama-3.1-8b-instant",
              "match_model": "llama-3.1-8b-instant",
          }
          DATABASE = {
              "path": "data/jobs.db",
          }
          PYEOF

      - name: Restore jobs database
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: jobs-db-

      - name: Restore email updates
        uses: actions/cache@v4
        with:
          path: data/email_updates.json
          key: email-updates-${{ github.run_id }}
          restore-keys: email-updates-

      - name: Create data directory
        run: mkdir -p data

      - name: Run Job Hunter + Gmail Reader
        run: python main.py --once --no-apply

      - name: Save jobs database
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}

      - name: Commit email_updates.json to repo
        run: |
          git config user.name "Job Hunter Bot"
          git config user.email "bot@jobhunter.com"
          if [ -f data/email_updates.json ]; then
            git add data/email_updates.json
            git diff --staged --quiet || git commit -m "Update email_updates.json [skip ci]"
            git push
          fi