<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;
    --accent:#6c63ff;--accent2:#ff6584;--green:#00d4a0;--yellow:#ffd166;
    --red:#ff6b6b;--blue:#4ecdc4;--text:#e8e8f0;--muted:#6b6b8a;--r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 24px}
  body::before{content:'';position:fixed;top:-40%;left:-20%;width:70%;height:70%;background:radial-gradient(ellipse,#6c63ff18 0%,transparent 70%);pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:1100px;margin:0 auto}
  h1{font-family:'DM Serif Display',serif;font-size:34px;margin-bottom:4px}
  h1 span{color:var(--accent);font-style:italic}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:28px}
  .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--accent))}
  .stat-num{font-family:'DM Serif Display',serif;font-size:30px;color:var(--text)}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
  .target-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .target-bar-bg{flex:1;min-width:150px;background:var(--border);border-radius:99px;height:8px;overflow:hidden}
  .target-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .5s}
  input[type=number].ti{width:55px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:4px 7px;text-align:center;font-family:'DM Mono',monospace}
  .filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .fb{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif}
  .fb.active{background:var(--accent);color:white;border-color:var(--accent)}
  .si{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:5px 12px;outline:none;font-family:'DM Sans',sans-serif;margin-left:auto}
  .si:focus{border-color:var(--accent)}
  .apps-list{display:flex;flex-direction:column;gap:10px}
  .ac{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;transition:border-color .15s,transform .15s;cursor:pointer}
  .ac:hover{border-color:#3a3a5a;transform:translateY(-1px)}
  .ac.exp{border-color:var(--accent)}
  .atitle{font-size:15px;font-weight:600}
  .acomp{font-size:12px;color:var(--muted);margin-top:3px}
  .ameta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .adetail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .ac.exp .adetail{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .di label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px}
  .di span,.di a{font-size:12px;color:var(--text)}
  .di a{color:var(--accent);text-decoration:none}
  .di.full{grid-column:1/-1}
  .di span.desc{white-space:pre-wrap;font-size:11px;color:var(--muted);max-height:120px;overflow-y:auto;display:block;line-height:1.5}
  .sb{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
  .s-applied{background:#6c63ff22;color:var(--accent)}
  .s-interview{background:#ffd16622;color:var(--yellow)}
  .s-offer{background:#00d4a022;color:var(--green)}
  .s-rejected{background:#ff6b6b22;color:var(--red)}
  .s-ghosted{background:#6b6b8a22;color:var(--muted)}
  .s-withdrawn{background:#ff658422;color:var(--accent2)}
  .db{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
  .pb{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
  .rb{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--blue)}
  .aa{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .ss{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;padding:4px 7px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
  .bd{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px;border-radius:4px;transition:color .15s}
  .bd:hover{color:var(--red)}
  .btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif}
  .btn-primary{background:var(--accent);color:white}
  .btn-secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .btn-add{background:linear-gradient(135deg,var(--accent),#9c8fff);color:white;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'DM Sans',sans-serif;box-shadow:0 4px 20px #6c63ff33}
  .btn-add:hover{transform:translateY(-2px)}
  .add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:20px;display:none}
  .add-form.open{display:block}
  .fg{display:flex;flex-direction:column;gap:6px}
  .fg label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .fg input,.fg select,.fg textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;transition:border-color .15s;outline:none}
  .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
  .fg textarea{resize:vertical;min-height:70px}
  .fg select option{background:var(--surface2)}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
  .form-actions{display:flex;gap:8px;margin-top:16px}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .section-title{font-family:'DM Serif Display',serif;font-size:22px}
  .empty-state{text-align:center;padding:50px;color:var(--muted)}
  .callback-alert{background:linear-gradient(135deg,#ffd16615,#ffd16605);border:1px solid #ffd16633;border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:none}
  .callback-alert.show{display:block}
  .cbt{font-size:13px;font-weight:600;color:var(--yellow);margin-bottom:8px}
  .cbi{font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid #ffd16615}
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:10px;padding:4px;width:fit-content}
  .tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif}
  .tab.active{background:var(--accent);color:white}
  .charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
  .ct{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
  .bar-chart{display:flex;flex-direction:column;gap:9px}
  .bar-row{display:flex;align-items:center;gap:9px}
  .bar-key{font-size:12px;color:var(--muted);width:70px;text-align:right;flex-shrink:0}
  .bar-bg{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width .6s}
  .bar-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--text);width:20px;flex-shrink:0}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .wd{text-align:center}
  .wdl{font-size:10px;color:var(--muted);margin-bottom:3px}
  .wdb{height:55px;border-radius:5px;background:var(--border);display:flex;align-items:flex-end;overflow:hidden}
  .wdf{width:100%;border-radius:5px;background:linear-gradient(180deg,var(--accent),#9c8fff);transition:height .5s}
  .wdn{font-size:11px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
  @media(max-width:600px){h1{font-size:26px}.ac{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px">
    <div>
      <h1>Application <span>Tracker</span></h1>
      <p class="subtitle">Sri Krishna Sai Kota · Data Engineer Job Search 2026</p>
    </div>
    <button class="btn-add" id="btnToggleForm">+ Log Application</button>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="target-section">
    <span style="font-size:13px;color:var(--muted);white-space:nowrap">Daily target</span>
    <div class="target-bar-bg"><div class="target-bar-fill" id="tFill" style="width:0%"></div></div>
    <span style="font-size:13px;font-weight:500;white-space:nowrap" id="tText">0 / 5 today</span>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--muted)">Daily:</span>
      <input type="number" class="ti" id="dTarget" value="5" min="1" max="50" onchange="saveTarget()">
      <span style="font-size:12px;color:var(--muted)">Weekly:</span>
      <input type="number" class="ti" id="wTarget" value="25" min="1" max="200" onchange="saveTarget()">
    </div>
  </div>

  <div class="callback-alert" id="cbAlert">
    <div class="cbt">📞 Interviews / Callbacks — Quick Reference</div>
    <div id="cbList"></div>
  </div>


  <!-- Heard Back Section -->
  <div id="heardBackSection" style="display:none;margin-bottom:24px">
    <div style="background:linear-gradient(135deg,#ffd16610,#ffd16605);border:1px solid #ffd16644;border-radius:14px;padding:20px 24px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <span style="font-size:20px">🔔</span>
        <span style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--text)">Companies That Responded</span>
        <span id="heardBackBadge" style="background:var(--yellow);color:#1a1200;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:4px"></span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="lastSynced"></span>
        <button id="syncBtn" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif">↻ Sync</button>
      </div>
      <div id="heardBackList" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="apps">Applications</button>
    <button class="tab" data-tab="charts">Analytics</button>
  </div>

  <div class="add-form" id="addForm">
    <div style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:16px">Log Application</div>
    <div class="form-grid">
      <div class="fg"><label>Job Title *</label><input id="f_title" placeholder="e.g. Junior Data Engineer"></div>
      <div class="fg"><label>Company *</label><input id="f_company" placeholder="e.g. Acme Analytics"></div>
      <div class="fg"><label>Location</label><input id="f_location" placeholder="e.g. Tampa, FL or Remote"></div>
      <div class="fg"><label>Platform</label>
        <select id="f_platform">
          <option>LinkedIn</option><option>Indeed</option><option>Glassdoor</option>
          <option>Dice</option><option>Handshake</option><option>JobRight</option>
          <option>Company Website</option><option>Referral</option><option>Other</option>
        </select>
      </div>
      <div class="fg"><label>Date Applied</label><input type="date" id="f_date"></div>
      <div class="fg"><label>Resume Version</label><input id="f_resume" placeholder="e.g. resume_v2_dataeng.pdf"></div>
      <div class="fg"><label>Job URL</label><input type="url" id="f_url" placeholder="https://..."></div>
      <div class="fg"><label>Status</label>
        <select id="f_status">
          <option value="applied">Applied</option><option value="interview">Interview</option>
          <option value="offer">Offer</option><option value="rejected">Rejected</option>
          <option value="ghosted">Ghosted</option><option value="withdrawn">Withdrawn</option>
        </select>
      </div>
      <div class="fg" style="grid-column:1/-1"><label>Notes</label>
        <textarea id="f_notes" placeholder="Cover letter sent, recruiter name, match score from bot, anything useful..."></textarea>
      </div>
      <div class="fg" style="grid-column:1/-1"><label>Job Description (paste here)</label>
        <textarea id="f_desc" placeholder="Paste the job description here for future reference..." style="min-height:90px"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btnSaveApp">Save</button>
      <button class="btn btn-secondary" id="btnCancelForm">Cancel</button>
    </div>
  </div>

  <div id="tab-apps">
    <div class="section-header">
      <div class="section-title" id="listTitle">All Applications</div>
    </div>
    <div class="filter-bar">
      <button class="fb active" data-filter="all">All</button>
      <button class="fb" data-filter="applied">Applied</button>
      <button class="fb" data-filter="interview">Interview</button>
      <button class="fb" data-filter="offer">Offer</button>
      <button class="fb" data-filter="rejected">Rejected</button>
      <button class="fb" data-filter="ghosted">Ghosted</button>
      <input class="si" placeholder="Search..." id="searchInp">
    </div>
    <div class="apps-list" id="appsList"></div>
  </div>

  <div id="tab-charts" style="display:none">
    <div class="charts-grid" id="chartsGrid"></div>
  </div>
</div>

<script src="tracker.js"></script>
</body>
</html>
